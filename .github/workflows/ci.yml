name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ORKESTR_BROWSER_LAUNCH_DISABLED: "1"
      ORKESTR_RECOVER_RUNNING_ON_START: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run smoke
      - run: npm run demo:coding-agent
      - run: npm run docker:build
