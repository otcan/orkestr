name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    env:
      ORKESTR_BROWSER_LAUNCH_DISABLED: "1"
      ORKESTR_RECOVER_RUNNING_ON_START: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Syntax check
        run: |
          find apps packages scripts examples -path '*/node_modules/*' -prune -o \( -name '*.js' -o -name '*.mjs' \) -print |
            while read -r file; do node --check "$file"; done

  build:
    runs-on: ubuntu-latest
    env:
      ORKESTR_BROWSER_LAUNCH_DISABLED: "1"
      ORKESTR_RECOVER_RUNNING_ON_START: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: dist/server

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      ORKESTR_BROWSER_LAUNCH_DISABLED: "1"
      ORKESTR_RECOVER_RUNNING_ON_START: "0"
      ORKESTR_TEST_SHARD_TOTAL: "4"
      ORKESTR_TEST_SHARD_INDEX: ${{ matrix.shard }}
      ORKESTR_TEST_CONCURRENCY: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: dist/server
      - name: Test
        run: npm run test:ci

  smoke:
    runs-on: ubuntu-latest
    needs: build
    env:
      ORKESTR_BROWSER_LAUNCH_DISABLED: "1"
      ORKESTR_RECOVER_RUNNING_ON_START: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: dist/server
      - run: npm run smoke
      - run: npm run demo:coding-agent
