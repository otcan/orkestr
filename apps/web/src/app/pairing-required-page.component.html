<main class="pairing-shell">
  <section class="pairing-panel" aria-label="Pairing Required">
    <header>
      <p>Orkestr</p>
      <h1>Approve this browser</h1>
    </header>

    @if (error) {
      <div class="notice error">{{ error }}</div>
    } @else if (notice) {
      <div class="notice">{{ notice }}</div>
    }

    @if (challenge) {
      <button class="command" type="button" (click)="copyCommand()" [attr.aria-label]="'Copy ' + approveCommand()">
        <code>{{ approveCommand() }}</code>
      </button>
      <div class="status">
        <span [class]="challengeStatusClass()">{{ challenge.status }}</span>
        <small>Expires {{ expiryLabel() }}</small>
      </div>
      <button class="secondary" type="button" (click)="refreshChallenge()" [disabled]="busy">Check</button>
    } @else {
      <button type="button" (click)="createChallenge()" [disabled]="busy">
        {{ busy ? "Creating" : "Create command" }}
      </button>
    }
  </section>
</main>
