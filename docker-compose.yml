services:
  orkestr:
    image: ${ORKESTR_IMAGE:-ghcr.io/otcan/orkestr:latest}
    pull_policy: ${ORKESTR_PULL_POLICY:-missing}
    ports:
      - "${ORKESTR_BIND_ADDRESS:-127.0.0.1}:${ORKESTR_PUBLISH_PORT:-19812}:19812"
    environment:
      ORKESTR_HOME: /data
      ORKESTR_PORT: "19812"
      ORKESTR_HOST: 0.0.0.0
      ORKESTR_DOCKER: "1"
      ORKESTR_DOCKER_HOST_BIND_ADDRESS: ${ORKESTR_BIND_ADDRESS:-127.0.0.1}
      ORKESTR_REVERSE_PROXY_LOCAL_BIND: ${ORKESTR_REVERSE_PROXY_LOCAL_BIND:-}
      ORKESTR_AUTH_REQUIRED: ${ORKESTR_AUTH_REQUIRED:-0}
      ORKESTR_BROWSER_LAUNCH_DISABLED: ${ORKESTR_BROWSER_LAUNCH_DISABLED:-1}
      ORKESTR_CADDY_ENABLED: ${ORKESTR_CADDY_ENABLED:-0}
      ORKESTR_COOKIE_SECURE: ${ORKESTR_COOKIE_SECURE:-0}
      ORKESTR_PUBLIC_HTTPS_URL: ${ORKESTR_PUBLIC_HTTPS_URL:-}
      ORKESTR_TAILSCALE_HTTPS_NAME: ${ORKESTR_TAILSCALE_HTTPS_NAME:-}
      ORKESTR_SECURITY_RETURN_PAIRING_CODE: ${ORKESTR_SECURITY_RETURN_PAIRING_CODE:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-}
      WHATSAPP_BRIDGE_MODE: ${WHATSAPP_BRIDGE_MODE:-local}
      ORKESTR_WHATSAPP_EXTERNAL_BRIDGE_ENABLED: ${ORKESTR_WHATSAPP_EXTERNAL_BRIDGE_ENABLED:-0}
      WHATSAPP_BRIDGE_URL: ${WHATSAPP_BRIDGE_URL:-}
      CODEX_HOME: ${CODEX_HOME:-/data/codex}
      ORKESTR_CODEX_BIN: ${ORKESTR_CODEX_BIN:-codex}
      ORKESTR_RUNTIME_CODEX_COMMAND: ${ORKESTR_RUNTIME_CODEX_COMMAND:-codex --dangerously-bypass-approvals-and-sandbox}
      ORKESTR_RUNTIME_WORKSPACE_ROOT: ${ORKESTR_RUNTIME_WORKSPACE_ROOT:-/workspace}
      ORKESTR_RUNTIME_SUBMIT_KEYS: ${ORKESTR_RUNTIME_SUBMIT_KEYS:-C-m}
      ORKESTR_RUNTIME_SUBMIT_DELAY_MS: ${ORKESTR_RUNTIME_SUBMIT_DELAY_MS:-250}
      ORKESTR_WAKE_READY_TIMEOUT_MS: ${ORKESTR_WAKE_READY_TIMEOUT_MS:-60000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      WA_CHROME_PATH: /usr/bin/chromium
      ORKESTR_CHROME_PATH: /usr/bin/chromium
      ORKESTR_OVERLAY_DIR: /overlay
    volumes:
      - orkestr-data:/data
      - ${ORKESTR_WORKSPACE_HOST_DIR:-./workspace}:/workspace
      - ${ORKESTR_OVERLAY_HOST_DIR:-./examples/private-overlay}:/overlay:ro
    restart: unless-stopped

volumes:
  orkestr-data:
