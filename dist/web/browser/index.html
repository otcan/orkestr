<!doctype html>
<html lang="en" data-beasties-container>
  <head>
    <meta charset="utf-8">
    <title>Orkestr</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>:root{color:#d7e7ce;background:#070b07;font-family:IBM Plex Mono,JetBrains Mono,SFMono-Regular,Consolas,monospace;color-scheme:dark}html{height:100%;background:#070b07}*{box-sizing:border-box}body{margin:0;min-height:100vh;min-height:100dvh;height:100%;overflow-x:hidden;background:radial-gradient(circle at top left,rgba(88,165,92,.18),transparent 30rem),linear-gradient(135deg,#050805,#0b130b 58%,#101a12)}.boot-shell{min-height:100vh;min-height:100dvh;display:grid;align-content:center;gap:12px;padding:32px;color:#e7f7df;background:#070b07}.boot-shell h1,.boot-shell p{max-width:720px;margin:0}.boot-shell h1{font-size:28px}.boot-shell p{color:#a7c39c}.boot-eyebrow{color:#66e478;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}</style><link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles.css"></noscript></head>
  <body>
    <ork-root>
      <main class="boot-shell" role="status" aria-live="polite">
        <p class="boot-eyebrow">Orkestr</p>
        <h1>Loading Orkestr...</h1>
        <p>If this stays visible, refresh the page or check the browser console.</p>
      </main>
    </ork-root>
    <noscript>
      <main class="boot-shell">
        <p class="boot-eyebrow">Orkestr</p>
        <h1>JavaScript is required</h1>
        <p>Enable JavaScript to use the Orkestr web UI.</p>
      </main>
    </noscript>
  <script src="polyfills.js" type="module"></script><script src="main.js" type="module"></script></body>
</html>
