image:
  repository: orkestr/orkestr
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

demo:
  enabled: false
  # User-facing demo VM input.
  whatsappNumber: ""
  # Broker URL used by the demo VM to register and receive its broker UUID.
  # Defaults to the local Orkestr API when empty.
  brokerBaseUrl: ""
  brokerRegistrationTokenSecretName: ""
  brokerRegistrationTokenSecretKey: token
  # Preferred stable public base URL for the VM, for example https://demo.orkestr.de.
  # Configure DNS/TLS/reverse proxy outside the chart. If set, the notifier sends
  # <publicBaseUrl>/setup/pairing?instanceId=<broker-uuid>&return=%2Fsetup.
  publicBaseUrl: ""
  # Optional full public setup/pairing URL override. This wins over publicBaseUrl.
  setupUrl: ""
  # Last-resort fallback for local demos only. Production/demo-review runs should
  # use publicBaseUrl or setupUrl because random quick tunnels can fail on mobile DNS.
  cloudflareFallback: false
  relay:
    bridgeUrl: ""
    accountId: responder
    tokenSecretName: ""
    tokenSecretKey: token

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

env:
  ORKESTR_HOME: /data
  CODEX_HOME: /data/codex
  ORKESTR_HOST: 0.0.0.0
  ORKESTR_PORT: "3000"
  PORT: "3000"
  ORKESTR_BROWSER_DESKTOP_MODE: browserctl
  ORKESTR_BROWSERCTL_PATH: /app/scripts/browserctl.mjs
  ORKESTR_CHROME_NO_SANDBOX: "1"

extraEnv: []

resources: {}
